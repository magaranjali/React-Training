<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>

<script>
    let fruits = ["apple", "banana", "orange", "grape", "kiwi"];

    //for in
    for (var index in fruits) {
        document.write(fruits[index] + "<br>");
    }

    document.write("<br>");

    //for of
     for (var member of fruits) {
        document.write("<li>", member, "</li>");
    }
    document.write("<br>");

    //for each - used for arrray, anonymous function
    let newFruits =fruits.forEach((member, index) =>{
        document.write("<li>", index +1, "." + member, "</li>");
        return member.toUpperCase();
    })
    document.write("New Fruits: "+newFruits + "<br>"); //undefined because forEach does not return anything
 document.write("<br>");

    //map- most used
    newFruits = fruits.map((member, index) =>{
        document.write("<li>", index +1, "." + member, "</li>");
        return member.toUpperCase();
    })
    document.write("New Fruits: "+newFruits+ "<br>");


</script>
</html>
